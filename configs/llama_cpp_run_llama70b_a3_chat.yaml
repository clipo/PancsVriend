# =============================================================================
# llama.cpp simulation run config — Llama-3.3-70B, A3 prompt style, CHAT+grammar
# =============================================================================
# Companion to configs/llama_cpp_run_llama70b_a3.yaml (which used the raw
# /v1/completions endpoint). This variant runs the SAME A3 prompt structure
# (scenarios_a3.py) through the /v1/chat/completions endpoint with the MOVE/STAY
# GBNF grammar (llm_style: chat+grammar), to compare the chat vs completions
# endpoint at fixed prompt style.
#
# NOTE: the chat endpoint applies the model's chat template — start llama-server
# with `--jinja` (use the GGUF's template) and `--reasoning off`. On Llama-3.3
# (not a reasoning model) --reasoning off is a harmless no-op; the flag matters
# for the Qwen chat run that shares this pattern.
#
#   python run_llm_probability_simulation_analysis.py \
#     --config-yaml configs/llama_cpp_run_llama70b_a3_chat.yaml \
#     --config-profile smoke_test     # or: production
# =============================================================================

run_root: "experiments_with_llama_cpp"
run_id: null

llm_model: "Llama-3.3-70B-Instruct-Q4_K_M-a3-chat"

manifest_file: null
token_log_probs_root: null
skip_token_probs: true
skip_contexts: false
skip_analysis: false
continue_on_error: false
dry_run: false
token_args: {}

contexts_args:
  scenarios: []                 # empty = ALL scenarios in scenario_file (6)
  runs: 10
  max_steps: 100
  use_log_probs: false
  log_probs_root: null
  temperature: 0.3
  save_every_steps: 10
  llm_url: "http://localhost:8082/v1/chat/completions"
  llm_style: "chat+grammar"
  scenario_file: "scenarios_a3.py"
  llm_api_key: ""
  processes: 4
  no_parallel: false
  new: true
  llm_model: null
  manifest_file: null

analysis_args:
  no_recompute: false
  movement_only: false
  include_movement: false
  output_folder: null
  llm_model: null
  manifest_file: null
  quiet: false

profiles:

  smoke_test:
    skip_token_probs: true
    skip_contexts: false
    skip_analysis: false
    continue_on_error: false
    dry_run: false
    token_args: {}
    contexts_args:
      scenarios: [baseline]
      runs: 2                   # smoke = minimal: just prove the pipeline works
      max_steps: 2
      use_log_probs: false
      log_probs_root: null
      temperature: 0.3
      save_every_steps: 1
      llm_url: "http://localhost:8082/v1/chat/completions"
      llm_style: "chat+grammar"
      scenario_file: "scenarios_a3.py"
      llm_api_key: ""
      processes: 4
      no_parallel: false
      new: true
      llm_model: null
      manifest_file: null
    analysis_args:
      no_recompute: false
      movement_only: false
      include_movement: false
      output_folder: null
      llm_model: null
      manifest_file: null
      quiet: true

  production:
    skip_token_probs: true
    skip_contexts: false
    skip_analysis: false
    continue_on_error: false
    dry_run: false
    token_args: {}
    contexts_args:
      scenarios: []             # all 6 scenarios from scenarios_a3.py
      runs: 10
      max_steps: 100
      use_log_probs: false
      log_probs_root: null
      temperature: 0.3
      save_every_steps: 10
      llm_url: "http://localhost:8082/v1/chat/completions"
      llm_style: "chat+grammar"
      scenario_file: "scenarios_a3.py"
      llm_api_key: ""
      processes: 4
      no_parallel: false
      new: true
      llm_model: null
      manifest_file: null
    analysis_args:
      no_recompute: false
      movement_only: false
      include_movement: false
      output_folder: null
      llm_model: null
      manifest_file: null
      quiet: false
