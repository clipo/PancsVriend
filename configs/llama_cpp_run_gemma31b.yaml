# =============================================================================
# llama.cpp simulation run config
# =============================================================================
#
# Drives run_llm_probability_simulation_analysis.py against a local
# `llama_cpp.server`. Stage 1 (token-probs) is skipped; the simulation queries
# the server directly at temperature 0.3 and saves state every step.
#
# 1. Start the server first (speed settings pre-baked there; edit only the
#    GGUF path):  python -m llama_cpp.server --config_file configs/llama_cpp_server.yaml
# 2. Run, picking a profile with --config-profile:
#      python run_llm_probability_simulation_analysis.py \
#        --config-yaml configs/llama_cpp_simulation_run.yaml \
#        --config-profile smoke_test     # or: production
#
# Profiles:  smoke_test = 5 runs x 200 steps x baseline (validate setup)
#            production  = 100 runs x 1000 steps x all scenarios
#
# The native llama-server (launched by run_gemma31b.sh) runs continuous batching
# with $NP slots, so `processes` should be ≈ NP (keep them in sync). Profiles are
# shallow-merged over the top-level keys, so each profile repeats the full
# contexts_args / analysis_args blocks.
# =============================================================================


# ---------------------------------------------------------------------------
# Shared top-level defaults (apply when no profile is selected)
# ---------------------------------------------------------------------------

# Sampler note: live-sampling params (top_k/top_p/min_p/penalties) are pinned to PURE
# TEMPERATURE in llm_runner.py (SAMPLER_PARAMS), NOT here and NOT left to server defaults
# (reproducibility), and they match the probability estimator's pure-temperature softmax.
# Edit SAMPLER_PARAMS in llm_runner.py to change the sampling regime. Temperature stays below.
run_root: "experiments_with_llama_cpp"
run_id: null                    # auto: run_<timestamp>_<model_slug>

# REQUIRED (run aborts if null). Does NOT pick the model (the server does) —
# it only labels the output run dir + analysis files. Set it to identify the
# GGUF you loaded, e.g. "gemma-3-4b-it-q4".
llm_model: "gemma-4-31b-q5" # this will be the label of the model. use either the same name as the model loaded or a custom name of your choice.

manifest_file: null
token_log_probs_root: null

# Skip Stage 1 (token probabilities); run simulation + analysis.
skip_token_probs: true
skip_contexts: false
skip_analysis: false

continue_on_error: false
dry_run: false

# Stage 1 is skipped, so token_args is unused.
token_args: {}

# Default contexts_args (used only if no profile is selected).
contexts_args:
  scenarios: [baseline]
  runs: 5
  max_steps: 200
  use_log_probs: false
  log_probs_root: null
  temperature: 0.3
  save_every_steps: 10
  llm_url: "http://localhost:8081/v1/completions"
  llm_api_key: ""
  processes: 8                  # native llama-server batches; keep ≈ NP (run_gemma31b.sh)
  no_parallel: false
  new: true
  llm_model: null
  manifest_file: null

analysis_args:
  no_recompute: false
  movement_only: false
  include_movement: false
  output_folder: null
  llm_model: null
  manifest_file: null
  quiet: false


# ---------------------------------------------------------------------------
# Profiles
# ---------------------------------------------------------------------------

profiles:

  # -------------------------------------------------------------------------
  # SMOKE TEST: validate end-to-end setup before a long run.
  # -------------------------------------------------------------------------
  smoke_test:
    skip_token_probs: true
    skip_contexts: false
    skip_analysis: false
    continue_on_error: false
    dry_run: false

    token_args: {}

    contexts_args:
      scenarios: [baseline]       # one scenario only
      runs: 2
      max_steps: 2
      use_log_probs: false        # CRITICAL: do not load Stage 1 outputs
      log_probs_root: null
      temperature: 0.3
      save_every_steps: 1         # save every step
      llm_url: "http://localhost:8081/v1/completions"
      llm_api_key: ""
      processes: 2                # smoke test: a couple concurrent runs is plenty
      no_parallel: false
      new: true
      llm_model: null
      manifest_file: null

    analysis_args:
      no_recompute: false
      movement_only: false
      include_movement: false
      output_folder: null
      llm_model: null
      manifest_file: null
      quiet: true

  # -------------------------------------------------------------------------
  # PRODUCTION: full study. 100 runs x 1000 steps across all scenarios.
  # On ONE llama_cpp.server this is slow (serial). To parallelise, run several
  # server instances on different ports behind a load balancer and point
  # llm_url at the balancer — see the guide's throughput section.
  # -------------------------------------------------------------------------
  production:
    skip_token_probs: true
    skip_contexts: false
    skip_analysis: false
    continue_on_error: false
    dry_run: false

    token_args: {}

    contexts_args:
      scenarios: []               # empty list = all scenarios
      runs: 10
      max_steps: 100
      use_log_probs: false
      log_probs_root: null
      temperature: 0.3
      save_every_steps: 10
      llm_url: "http://localhost:8081/v1/completions"
      llm_api_key: ""
      processes: 4                # production: from slot_sweep (throughput flat past 4; higher only adds latency)
      no_parallel: false
      new: true
      llm_model: null
      manifest_file: null

    analysis_args:
      no_recompute: false
      movement_only: false
      include_movement: false
      output_folder: null
      llm_model: null
      manifest_file: null
      quiet: false
