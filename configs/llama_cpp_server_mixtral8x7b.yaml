# llama.cpp server config — Mixtral 8x7B Instruct v0.1 Q5_K_M, port 8083
# NOTE: only used by the LEGACY single-stream `python -m llama_cpp.server`.
# run_mixtral8x7b.sh now launches the native `llama-server` (continuous batching)
# and does NOT read this file — set slots/ctx/ngl via the vars at the top of that
# script; the GGUF path is resolved there via find_gguf.sh.
host: "0.0.0.0"
port: 8083

models:
  - model: "__GGUF_PATH__"
    model_alias: "mixtral-8x7b-q5"
    n_gpu_layers: -1
    flash_attn: true
    n_ctx: 2048
    n_batch: 512
