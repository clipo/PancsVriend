# llama.cpp server config — Mixtral 8x7B Instruct v0.1 Q5_K_M, port 8083
# Model path is resolved at startup by run_mixtral8x7b.sh via find_gguf.sh —
# do NOT edit the model: line here; edit GGUF_FILENAME in run_mixtral8x7b.sh.
host: "0.0.0.0"
port: 8083

models:
  - model: "__GGUF_PATH__"
    model_alias: "mixtral-8x7b-q5"
    n_gpu_layers: -1
    flash_attn: true
    n_ctx: 2048
    n_batch: 512
