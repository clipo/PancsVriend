# =============================================================================
# llama.cpp simulation run config — Llama-3.3-70B, A3 prompt style
# =============================================================================
# Production study using the A3 prompt structure (see scenarios_a3.py and
# prompt_refinement/README.md for why A3 won) on the raw completions endpoint
# with the MOVE/STAY GBNF grammar (llm_style: completions+grammar).
#
# New keys vs the original config (added 2026-07-16, tests: tests/test_llm_style.py):
#   contexts_args.llm_style      completions | completions+grammar | chat | chat+grammar
#   contexts_args.scenario_file  python module whose CONTEXT_SCENARIOS replaces
#                                context_scenarios.py; ONLY its scenarios run
#
#   python run_llm_probability_simulation_analysis.py \
#     --config-yaml configs/llama_cpp_run_llama70b_a3.yaml \
#     --config-profile smoke_test     # or: production
# =============================================================================

run_root: "experiments_with_llama_cpp"
run_id: null

# Distinct label: same GGUF as Llama-3.3-70B-Instruct-Q4_K_M runs, but the A3
# prompt style makes results non-comparable token-for-token with earlier runs —
# the label keeps the experiment namespaces separate.
llm_model: "Llama-3.3-70B-Instruct-Q4_K_M-a3"

manifest_file: null
token_log_probs_root: null
skip_token_probs: true
skip_contexts: false
skip_analysis: false
continue_on_error: false
dry_run: false
token_args: {}

contexts_args:
  scenarios: []                 # empty = ALL scenarios in scenario_file (6)
  runs: 20
  max_steps: 100
  use_log_probs: false
  log_probs_root: null
  temperature: 0.3
  save_every_steps: 10
  llm_url: "http://localhost:8082/v1/completions"
  llm_style: "completions+grammar"
  scenario_file: "scenarios_a3.py"
  llm_api_key: ""
  processes: 4
  no_parallel: false
  new: true
  llm_model: null
  manifest_file: null

analysis_args:
  no_recompute: false
  movement_only: false
  include_movement: false
  output_folder: null
  llm_model: null
  manifest_file: null
  quiet: false

profiles:

  smoke_test:
    skip_token_probs: true
    skip_contexts: false
    skip_analysis: false
    continue_on_error: false
    dry_run: false
    token_args: {}
    contexts_args:
      scenarios: [baseline]
      runs: 2                   # smoke = minimal: just prove the pipeline works
      max_steps: 2              # just enough to prove the pipeline works end-to-end
      use_log_probs: false
      log_probs_root: null
      temperature: 0.3
      save_every_steps: 1
      llm_url: "http://localhost:8082/v1/completions"
      llm_style: "completions+grammar"
      scenario_file: "scenarios_a3.py"
      llm_api_key: ""
      processes: 4
      no_parallel: false
      new: true
      llm_model: null
      manifest_file: null
    analysis_args:
      no_recompute: false
      movement_only: false
      include_movement: false
      output_folder: null
      llm_model: null
      manifest_file: null
      quiet: true

  production:
    skip_token_probs: true
    skip_contexts: false
    skip_analysis: false
    continue_on_error: false
    dry_run: false
    token_args: {}
    contexts_args:
      scenarios: []             # all 6 scenarios from scenarios_a3.py
      runs: 20
      max_steps: 100
      use_log_probs: false
      log_probs_root: null
      temperature: 0.3
      save_every_steps: 10
      llm_url: "http://localhost:8082/v1/completions"
      llm_style: "completions+grammar"
      scenario_file: "scenarios_a3.py"
      llm_api_key: ""
      processes: 4
      no_parallel: false
      new: true
      llm_model: null
      manifest_file: null
    analysis_args:
      no_recompute: false
      movement_only: false
      include_movement: false
      output_folder: null
      llm_model: null
      manifest_file: null
      quiet: false
