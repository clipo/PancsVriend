# Guide template for llm_probability_simulation_analysis
# (script: run_llm_probability_simulation_analysis.py)
#
# Keep this YAML as your reusable config source.
# The pipeline maps top-level keys and stage arg maps to CLI flags.

# ============================
# Top-level parameters
# ============================

# Root folder for isolated runs (default)
run_root: "experiments_with_log_probs"

# Optional run folder name (default: null -> auto run_<timestamp>_<model_slug>)
run_id: null

# REQUIRED in CLI (no built-in default). Set to your target model.
llm_model: "mixtral:8x22b-instruct"

# Optional explicit manifest path (default: null -> auto-created under <run>/manifest)
manifest_file: null

# Optional token-stage fallback root
# Used when token_args.token_output_root and token_args.output_dir are null.
# Effective output dir becomes:
# <token_log_probs_root>/<model_slug>
token_log_probs_root: null

# Stage toggles (all defaults)
skip_token_probs: false
skip_contexts: false
skip_analysis: false

# Pipeline behavior toggles (all defaults)
continue_on_error: false
dry_run: false

# Pass-through args for llm_utility_approximation/llm_token_probabilities.py
# Keep each field null/empty to omit that flag.
token_args:
  scenario: all           # default: null (single-prompt mode unless set)
  logprob_api_structure: openai
  llm_url: null            # optional explicit token-stage endpoint override
  processes: 10          # default: null (effective default in script: 1)
  temperature: 0.0        # default: 0.3
  num_samples: null        # default: 1
  repeats_per_context: null  # default: null (falls back to num_samples)
  max_tokens: null         # default: 24
  top_logprobs: null       # default: 20
  timeout: null            # default: 30
  token_output_root: null  # pipeline-only key; preferred token root override for this stage
  output_dir: null         # default: null (pipeline auto-sets to <run>/log_probs/<model_slug>)
  resume: false            # default: false

# Pass-through args for run_all_contexts.py
contexts_args:
  scenarios: []            # default: all scenarios when omitted
  runs: 100               # default: null (effective new-run default in llm_runner: 10)
  max_steps: 1000          # default: null (effective default in llm_runner: 1000)
  llm_model: null          # default: null (pipeline auto-injects top-level llm_model)
  llm_url: null            # default: null (uses config.py OLLAMA_URL)
  llm_api_key: null        # default: null (uses config.py OLLAMA_API_KEY)
  processes: 50          # default: null (auto process count)
  save_every_steps: 1000   # default: null (effective default in llm_runner: 1)
  no_parallel: false       # default: false
  use_log_probs: true     # default: false
  log_probs_root: null     # if null, pipeline falls back to effective token root
  new: false               # default: false
  manifest_file: null      # default: null (pipeline auto-sets)

# Pass-through args for analysis_tools/run_all_scenario_analysis.py
analysis_args:
  no_recompute: true      # default: false
  movement_only: false     # default: false
  include_movement: false  # default: false
  output_folder: null      # default: null (pipeline auto-sets to <run>/analysis)
  llm_model: null          # default: null (pipeline auto-injects top-level llm_model)
  manifest_file: null      # default: null (pipeline auto-injects manifest path)
  quiet: true             # default: false



# ============================
# Optional guidance/examples
# ============================
# token_args examples:
#   scenario: all
#   processes: 10
#   temperature: 0.3
#
#   scenario: baseline
#   num_samples: 5
#   max_tokens: 24
#
# contexts_args examples:
#   scenarios: [baseline]
#   runs: 1
#   max_steps: 2
#   processes: 1
#   new: true
#
# analysis_args examples:
#   quiet: true
#   include_movement: true


# ============================
# Reusable profiles
# ============================
profiles:
  # Fast sample run: 2 simulation steps, analysis enabled, token stage skipped.
  sample_2step_with_analysis:
    run_root: "experiments_with_log_probs"
    run_id: null
    llm_model: "mixtral:8x22b-instruct"
    token_args:
      scenario: null
      logprob_api_structure: ollama
      llm_url: null
      processes: null
      temperature: null
      num_samples: null
      repeats_per_context: null
      max_tokens: null
      top_logprobs: null
      timeout: null
      output_dir: null
      resume: false
    contexts_args:
      scenarios: [baseline]
      runs: 1
      max_steps: 2
      llm_model: null
      llm_url: null
      llm_api_key: null
      processes: 1
      save_every_steps: 1
      no_parallel: false
      use_log_probs: false
      log_probs_root: null
      new: true
      manifest_file: null
    analysis_args:
      no_recompute: false
      movement_only: false
      include_movement: false
      output_folder: null
      llm_model: null
      manifest_file: null
      quiet: true
    manifest_file: null
    token_log_probs_root: null
    skip_token_probs: true
    skip_contexts: false
    skip_analysis: false
    continue_on_error: false
    dry_run: false
